name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rust_target: aarch64-apple-darwin
            label: macos-arm64
          # macOS x86_64 暂时移除，后续按需加回
          # - os: macos-13
          #   rust_target: x86_64-apple-darwin
          #   label: macos-x86_64
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Python sidecar
        run: cd engine && pyinstaller probe.spec --noconfirm --clean

      - name: Rename sidecar for Tauri (Unix)
        if: runner.os != 'Windows'
        run: |
          mv engine/dist/probe-engine "tauri/probe-engine-${{ matrix.rust_target }}"
          chmod +x "tauri/probe-engine-${{ matrix.rust_target }}"
          # Strip PyInstaller's ad-hoc signature — macOS Gatekeeper rejects
          # app bundles containing ad-hoc signed Mach-O binaries as "damaged".
          codesign --remove-signature "tauri/probe-engine-${{ matrix.rust_target }}" || true

      - name: Rename sidecar for Tauri (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: mv engine/dist/probe-engine.exe "tauri/probe-engine-${{ matrix.rust_target }}.exe"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        run: cd tauri && cargo tauri build --target ${{ matrix.rust_target }}

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/*
