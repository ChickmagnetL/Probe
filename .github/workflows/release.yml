name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"
  UPDATER_REPO_URL: "https://github.com/ChickmagnetL/Probe"

jobs:
  verify_tag_version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches Cargo version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(python3 - <<'PY'
          import tomllib
          from pathlib import Path

          cargo = tomllib.loads(Path("tauri/Cargo.toml").read_text())
          print(cargo["package"]["version"])
          PY
          )"

          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag version ${TAG_VERSION} does not match tauri/Cargo.toml version ${CARGO_VERSION}." >&2
            exit 1
          fi

  build:
    needs: verify_tag_version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rust_target: aarch64-apple-darwin
            label: macos-arm64
          # macOS x86_64 暂时移除，后续按需加回
          # - os: macos-13
          #   rust_target: x86_64-apple-darwin
          #   label: macos-x86_64
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Python sidecar
        run: cd engine && pyinstaller probe.spec --noconfirm --clean

      - name: Rename sidecar for Tauri (Unix)
        if: runner.os != 'Windows'
        run: |
          mv engine/dist/probe-engine "tauri/probe-engine-${{ matrix.rust_target }}"
          chmod +x "tauri/probe-engine-${{ matrix.rust_target }}"

      - name: Rename sidecar for Tauri (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: mv engine/dist/probe-engine.exe "tauri/probe-engine-${{ matrix.rust_target }}.exe"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install Tauri CLI (prebuilt via cargo-binstall)
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall -y tauri-cli

      - name: Verify updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          test -n "$TAURI_SIGNING_PRIVATE_KEY" || {
            echo "TAURI_SIGNING_PRIVATE_KEY secret is required for updater builds" >&2
            exit 1
          }

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cd tauri && cargo tauri build --target ${{ matrix.rust_target }}

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
            tauri/target/${{ matrix.rust_target }}/release/bundle/macos/*.app.tar.gz
            tauri/target/${{ matrix.rust_target }}/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe
            tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe.sig
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Flatten release assets
        run: |
          rm -rf artifacts/release-assets
          mkdir -p artifacts/release-assets
          copied_any=false
          while IFS= read -r file; do
            cp "$file" "artifacts/release-assets/$(basename "$file")"
            copied_any=true
          done < <(
            find artifacts -type f \
              \( -name '*.dmg' \
              -o -name '*.app.tar.gz' \
              -o -name '*.app.tar.gz.sig' \
              -o -name '*.exe' \
              -o -name '*.exe.sig' \) \
              | sort
          )
          if [ "$copied_any" != true ]; then
            echo "No release assets were downloaded" >&2
            exit 1
          fi
          find artifacts/release-assets -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/release-assets/*

      - name: Capture release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" --jq '.body' > artifacts/release-notes.md
          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" --jq '.published_at' > artifacts/release-published-at.txt

      - name: Generate latest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PUBLISHED_AT="$(cat artifacts/release-published-at.txt)"
          node scripts/generate-updater-json.mjs \
            --artifact-dir artifacts/release-assets \
            --output artifacts/release-assets/latest.json \
            --version "$VERSION" \
            --notes-file artifacts/release-notes.md \
            --pub-date "$PUBLISHED_AT" \
            --url-prefix "${UPDATER_REPO_URL}/releases/download/${GITHUB_REF_NAME}" \
            --require-platform darwin-aarch64 \
            --require-platform windows-x86_64

      - name: Upload latest.json to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" artifacts/release-assets/latest.json --clobber
